artworks.sort((a, b) => a.category.localeCompare(b.category));

let currentIndex = 0;
const saved = sessionStorage.getItem('lastViewedImageIndex');
if (saved !== null && !isNaN(saved) && parseInt(saved, 10) < artworks.length) {
    currentIndex = parseInt(saved, 10);
}




const mainImageWrapper   = document.getElementById('main-image-wrapper');
const mainImage          = document.getElementById('main-image');
const imageTitleEl       = document.getElementById('image-title');
const imageDateEl        = document.getElementById('image-date');
const imageDescEl        = document.getElementById('image-description');
const imageStatementEl   = document.getElementById('image-artist-statement');
const statementSection   = document.getElementById('artist-statement-section');
const categoryButton     = document.getElementById('category-button');
const categoryDropdown   = document.getElementById('category-dropdown');
const thumbnailContainer = document.getElementById('thumbnail-container');
const thumbnailStrip     = document.getElementById('thumbnail-strip');
const fullscreenOverlay  = document.getElementById('fullscreen-overlay');
const fullscreenImage    = document.getElementById('fullscreen-image');
const closeFullscreenBtn = document.getElementById('close-fullscreen-btn');
const fsBtn              = document.getElementById('fullscreen-btn');
let scrollPosition = 0;




const imageCache = {};
function preload(index) {
    if (index < 0 || index >= artworks.length) return;
    const url = `/gallery/${artworks[index].filename}`;
    if (!imageCache[url]) {
        const img = new Image();
        img.src = url;
        imageCache[url] = img;
    }
}




function formatCategory(cat) {
    return cat.charAt(0).toUpperCase() + cat.slice(1).replace(/-/g, ' ');
}

function updateDisplay() {
    const art = artworks[currentIndex];
    sessionStorage.setItem('lastViewedImageIndex', currentIndex);

    categoryButton.textContent = formatCategory(art.category);
    imageTitleEl.textContent   = art.title        || '—';
    imageDateEl.textContent    = art.date         || '—';
    imageDescEl.textContent    = art.description  || '—';

    if (art.artist_statement && art.artist_statement.trim()) {
        imageStatementEl.textContent = art.artist_statement;
        statementSection.style.display = 'block';
    } else {
        statementSection.style.display = 'none';
    }

    
    const newSrc = `/gallery/${art.filename}`;
    mainImage.classList.add('fading');
    mainImageWrapper.classList.add('loading');

    const img = new Image();
    img.onload = () => {
        mainImage.src = newSrc;
        mainImage.alt = art.title;
        mainImage.classList.remove('fading');
        mainImageWrapper.classList.remove('loading');
        imageCache[newSrc] = img; 
    };
    img.onerror = () => {
        mainImage.src = newSrc; 
        mainImage.classList.remove('fading');
        mainImageWrapper.classList.remove('loading');
    };
    img.src = newSrc;

    
    preload(currentIndex - 1);
    preload(currentIndex + 1);

    updateActiveThumb();
    centerActiveThumbnail();
}




function enterFullscreen() {
    fullscreenImage.src = `/gallery/${artworks[currentIndex].filename}`;
    fullscreenOverlay.style.display = 'flex';
}
function exitFullscreen() {
    fullscreenOverlay.style.display = 'none';
    fullscreenImage.src = '';
}




function populateCategoryDropdown() {
    const cats = [...new Set(artworks.map(a => a.category))];
    categoryDropdown.innerHTML = '';
    cats.forEach(cat => {
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = formatCategory(cat);
        link.dataset.category = cat;
        link.addEventListener('click', e => {
            e.preventDefault();
            const idx = artworks.findIndex(a => a.category === e.target.dataset.category);
            if (idx !== -1) { currentIndex = idx; updateDisplay(); }
            categoryDropdown.classList.remove('show');
        });
        categoryDropdown.appendChild(link);
    });
}




function createThumbnails() {
    thumbnailStrip.innerHTML = '';
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const thumb = entry.target;
                if (thumb.dataset.src) {
                    thumb.src = thumb.dataset.src;
                    thumb.removeAttribute('data-src');
                    thumb.addEventListener('load', () => thumb.classList.add('loaded'), { once: true });
                    observer.unobserve(thumb);
                }
            }
        });
    }, { root: thumbnailContainer, rootMargin: '0px 200px 0px 200px' });

    artworks.forEach((art, index) => {
        const thumb = document.createElement('img');
        thumb.dataset.src = `/gallery/${art.filename}`; 
        thumb.src = ''; 
        thumb.className = 'thumbnail';
        thumb.alt = art.title;
        thumb.addEventListener('click', () => { currentIndex = index; updateDisplay(); });
        thumbnailStrip.appendChild(thumb);
        observer.observe(thumb);
    });
}

function updateActiveThumb() {
    document.querySelectorAll('.thumbnail').forEach((t, i) => {
        t.classList.toggle('active', i === currentIndex);
    });
}

function centerActiveThumbnail() {
    const active = document.querySelector('.thumbnail.active');
    if (!active) return;
    const containerWidth = thumbnailContainer.clientWidth;
    const stripWidth     = thumbnailStrip.scrollWidth;
    const thumbCenter    = active.offsetLeft + active.clientWidth / 2;
    let newPos = -(thumbCenter - containerWidth / 2);
    const maxScroll = -(stripWidth - containerWidth);
    newPos = Math.min(0, Math.max(maxScroll, newPos));
    scrollPosition = newPos;
    thumbnailStrip.style.transform = `translateX(${scrollPosition}px)`;
}

function handleThumbnailScroll(e) {
    e.preventDefault();
    scrollPosition -= e.deltaY;
    const maxScroll = -(thumbnailStrip.scrollWidth - thumbnailContainer.clientWidth);
    scrollPosition = Math.min(0, Math.max(maxScroll, scrollPosition));
    thumbnailStrip.style.transform = `translateX(${scrollPosition}px)`;
}




function initGallery() {
    if (!artworks || artworks.length === 0) {
        document.getElementById('gallery-container').style.display = 'none';
        return;
    }
    populateCategoryDropdown();
    createThumbnails();
    updateDisplay();

    
    categoryButton.addEventListener('click', () => categoryDropdown.classList.toggle('show'));
    window.addEventListener('click', e => {
        if (!e.target.matches('.dropdown-button')) categoryDropdown.classList.remove('show');
    });

    
    thumbnailContainer.addEventListener('wheel', handleThumbnailScroll, { passive: false });

    
    document.getElementById('prev-btn').addEventListener('click', () => {
        currentIndex = currentIndex > 0 ? currentIndex - 1 : artworks.length - 1;
        updateDisplay();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
        currentIndex = currentIndex < artworks.length - 1 ? currentIndex + 1 : 0;
        updateDisplay();
    });

    
    document.addEventListener('keydown', e => {
        if (fullscreenOverlay.style.display === 'flex') {
            if (e.key === 'Escape') exitFullscreen();
            return;
        }
        if (e.key === 'ArrowLeft')  { currentIndex = currentIndex > 0 ? currentIndex - 1 : artworks.length - 1; updateDisplay(); }
        if (e.key === 'ArrowRight') { currentIndex = currentIndex < artworks.length - 1 ? currentIndex + 1 : 0; updateDisplay(); }
    });

    
    fsBtn.addEventListener('click', enterFullscreen);
    mainImage.addEventListener('dblclick', enterFullscreen);
    closeFullscreenBtn.addEventListener('click', exitFullscreen);
    fullscreenOverlay.addEventListener('click', e => { if (e.target === fullscreenOverlay) exitFullscreen(); });
}

document.addEventListener('DOMContentLoaded', initGallery);
</script>
