<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Artwork</title>
<style>
body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 2em; }
input, textarea { width: 100%; margin-bottom: 1em; padding: 0.5em; }
button { padding: 0.5em 1em; }
.flash { color: green; }
</style>
</head>
<body>
<h1>Upload New Artwork</h1>
<a href="{{ url_for('gallery') }}">View Gallery</a>
<br><br>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class="flash">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<form method="POST" enctype="multipart/form-data">
  <label>Image:</label>
  <input type="file" name="image" id="image-input" required>
  <br>
  <img id="preview" src="" style="max-width:200px; display:none;">
  <br>

  <label>Title:</label>
  <input type="text" name="title" required>

  <label>Date (YYYY-MM-DD, optional):</label>
  <input type="date" name="date">

  <label>Description:</label>
  <textarea name="description"></textarea>

  <label>Category:</label>
  <input type="text" name="category">

  <button type="submit">Upload</button>
</form>

<script>
document.getElementById('image-input').onchange = function(event){
    let preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = 'block';
};
</script>
</body>
</html>
