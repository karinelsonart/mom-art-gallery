<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Artwork</title>
<style>
body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 2em; }
input, textarea { width: 100%; margin-bottom: 1em; padding: 0.5em; }
button { padding: 0.5em 1em; }
</style>
</head>
<body>
<h1>Edit Artwork</h1>
<a href="{{ url_for('gallery') }}">Back to Gallery</a>
<br><br>

<form method="POST" enctype="multipart/form-data">
  <img src="{{ url_for('static', filename='gallery/' + artwork.filename) }}" style="max-width:200px;"><br><br>

  <label>Replace Image (optional):</label>
  <input type="file" name="image" id="image-input"><br>
  <img id="preview" src="" style="max-width:200px; display:none;"><br>

  <label>Title:</label>
  <input type="text" name="title" value="{{ artwork.title }}" required>

  <label>Date (YYYY-MM-DD):</label>
  <input type="date" name="date" value="{{ artwork.date }}">

  <label>Description:</label>
  <textarea name="description">{{ artwork.description }}</textarea>

  <label>Category:</label>
  <input type="text" name="category" value="{{ artwork.category }}">

  <button type="submit">Save</button>
</form>

<script>
document.getElementById('image-input').onchange = function(event){
    let preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = 'block';
};
</script>

</body>
</html>
